<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Data Intelligence Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
  <link rel="stylesheet" href="/static/style.css?v=5" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- Mobile Topbar & Overlay -->
<div id="mobile-topbar">
  <button class="hamburger" onclick="toggleSidebar()">☰</button>
  <h2>📈 JarNox Stocks</h2>
</div>
<div id="overlay" onclick="toggleSidebar()"></div>

<!-- Sidebar -->
<aside id="sidebar">
  <header>
    <h1>📈 JarNox Stocks</h1>
    <p>India Market Intelligence</p>
  </header>
  <div class="search-container">
    <input type="search" id="stock-search" placeholder="Search stocks...">
  </div>
  <div id="company-list">Loading…</div>
</aside>

<!-- Loader -->
<div id="loader"><div class="spinner"></div><p id="loader-msg">Fetching data…</p></div>

<!-- Main -->
<main id="main">
  <div id="topbar">
    <h2 id="stock-title" class="clickable-title" onclick="if(window.innerWidth <= 768) toggleSidebar()">Select a company <span class="desktop-arrow">→</span></h2>
    <select id="period-select">
      <option value="30">Last 30 days</option>
      <option value="60">Last 60 days</option>
      <option value="90">Last 90 days</option>
      <option value="180">Last 6 months</option>
      <option value="365">Last 1 year</option>
    </select>
    <button id="refresh-btn" style="display:none" onclick="refreshCurrent()">⟳ Refresh</button>
    <button onclick="loadGainersLosers()" style="background:#6366f1;border-color:#6366f1;">📊 Gainers/Losers</button>
  </div>

  <div id="content">
    <div id="empty">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/>
      </svg>
      <p>Select a company to view its dashboard</p>
      <button class="mobile-only-btn" onclick="toggleSidebar()" style="margin-top:16px;padding:10px 20px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-weight:600;cursor:pointer;">Browse Companies</button>
    </div>
  </div>
</main>

<script src="/static/script.js?v=5"></script>
</body>
</html>
