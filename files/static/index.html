<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Data Intelligence Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d26;
      --card: #1e2130;
      --border: #2a2f45;
      --accent: #4f8ef7;
      --accent2: #34d399;
      --red: #f87171;
      --text: #e2e8f0;
      --muted: #64748b;
      --font: 'Segoe UI', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); display: flex; height: 100vh; overflow: hidden; }

    /* ── Sidebar ── */
    #sidebar {
      width: 240px; min-width: 240px; background: var(--surface);
      border-right: 1px solid var(--border); display: flex; flex-direction: column;
      overflow: hidden;
    }
    #sidebar header {
      padding: 18px 16px 12px;
      border-bottom: 1px solid var(--border);
    }
    #sidebar header h1 { font-size: 14px; font-weight: 700; color: var(--accent); letter-spacing: .5px; }
    #sidebar header p  { font-size: 11px; color: var(--muted); margin-top: 2px; }
    #company-list { flex: 1; overflow-y: auto; padding: 8px 0; }
    .company-item {
      padding: 10px 16px; cursor: pointer; border-left: 3px solid transparent;
      transition: all .15s;
    }
    .company-item:hover { background: var(--card); border-left-color: var(--accent); }
    .company-item.active { background: var(--card); border-left-color: var(--accent); }
    .company-item .sym { font-size: 13px; font-weight: 600; }
    .company-item .name { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .company-item .tag  {
      display: inline-block; font-size: 9px; padding: 1px 5px;
      border-radius: 4px; background: #2a2f45; color: var(--muted); margin-top: 4px;
    }

    /* ── Main ── */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #topbar {
      padding: 14px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; background: var(--surface);
    }
    #topbar h2 { font-size: 16px; font-weight: 700; flex: 1; }
    #topbar select, #topbar button {
      padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--card); color: var(--text); font-size: 13px; cursor: pointer;
    }
    #topbar button { background: var(--accent); border-color: var(--accent); font-weight: 600; }
    #topbar button:hover { opacity: .85; }

    #content { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 20px; }

    /* ── Stat cards ── */
    #stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 16px;
    }
    .stat-card .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .stat-card .value { font-size: 22px; font-weight: 700; margin-top: 4px; }
    .stat-card .sub   { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .up   { color: var(--accent2); }
    .down { color: var(--red); }

    /* ── Charts ── */
    .chart-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px 20px;
    }
    .chart-card h3 { font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 14px; }
    .chart-wrap { position: relative; height: 220px; }

    #charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }

    /* ── Compare ── */
    #compare-section { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }
    #compare-section h3 { font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 12px; }
    #compare-controls { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
    #compare-controls select, #compare-controls button {
      padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text); font-size: 13px; cursor: pointer;
    }
    #compare-controls button { background: #6366f1; border-color: #6366f1; font-weight: 600; }
    #compare-controls button:hover { opacity: .85; }
    #corr-badge { font-size: 12px; color: var(--muted); }
    .corr-val { font-weight: 700; color: var(--accent); }
    #compare-wrap { position: relative; height: 200px; }

    /* ── Gainers / Losers ── */
    #gl-section { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }
    #gl-section h3 { font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 12px; }
    #gl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .gl-list { list-style: none; }
    .gl-list li {
      display: flex; justify-content: space-between; align-items: center;
      padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px;
    }
    .gl-list li:last-child { border-bottom: none; }
    .gl-sym { font-weight: 600; }
    .gl-ret { font-weight: 700; }

    /* ── Loading ── */
    #loader {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
      align-items: center; justify-content: center; z-index: 999; flex-direction: column; gap: 12px;
    }
    #loader.show { display: flex; }
    .spinner {
      width: 40px; height: 40px; border: 4px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loader p { color: var(--text); font-size: 14px; }

    /* ── Empty state ── */
    #empty { display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; color: var(--muted); gap: 8px; }
    #empty svg { opacity: .3; }
    #empty p { font-size: 14px; }
    #empty span { font-size: 12px; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>

<!-- Sidebar -->
<aside id="sidebar">
  <header>
    <h1>📈 JarNox Stocks</h1>
    <p>India Market Intelligence</p>
  </header>
  <div id="company-list">Loading…</div>
</aside>

<!-- Loader -->
<div id="loader"><div class="spinner"></div><p id="loader-msg">Fetching data…</p></div>

<!-- Main -->
<main id="main">
  <div id="topbar">
    <h2 id="stock-title">Select a company →</h2>
    <select id="period-select">
      <option value="30">Last 30 days</option>
      <option value="60">Last 60 days</option>
      <option value="90">Last 90 days</option>
      <option value="180">Last 6 months</option>
      <option value="365">Last 1 year</option>
    </select>
    <button id="refresh-btn" style="display:none" onclick="refreshCurrent()">⟳ Refresh</button>
    <button onclick="loadGainersLosers()" style="background:#6366f1;border-color:#6366f1;">📊 Gainers/Losers</button>
  </div>

  <div id="content">
    <div id="empty">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/>
      </svg>
      <p>Select a company from the sidebar</p>
      <span>Data is fetched live from yfinance (NSE)</span>
    </div>
  </div>
</main>

<script>
const API = '';  // same origin
let currentSymbol = null;
let priceChart = null, returnChart = null, compareChart = null;

// ── Fetch helpers ────────────────────────────────────────────
async function apiFetch(path) {
  const r = await fetch(API + path);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

function showLoader(msg = 'Fetching data…') {
  document.getElementById('loader').classList.add('show');
  document.getElementById('loader-msg').textContent = msg;
}
function hideLoader() { document.getElementById('loader').classList.remove('show'); }

// ── Sidebar ──────────────────────────────────────────────────
async function loadCompanies() {
  try {
    const data = await apiFetch('/companies');
    const el = document.getElementById('company-list');
    el.innerHTML = '';
    data.companies.forEach(c => {
      const div = document.createElement('div');
      div.className = 'company-item';
      div.innerHTML = `<div class="sym">${c.symbol}</div><div class="name">${c.name}</div><span class="tag">${c.sector}</span>`;
      div.onclick = () => selectCompany(c.symbol, c.name);
      el.appendChild(div);
    });
  } catch(e) { document.getElementById('company-list').textContent = 'Error loading companies'; }
}

// ── Select company ───────────────────────────────────────────
async function selectCompany(symbol, name) {
  currentSymbol = symbol;
  document.querySelectorAll('.company-item').forEach(el => {
    el.classList.toggle('active', el.querySelector('.sym').textContent === symbol);
  });
  document.getElementById('stock-title').textContent = `${symbol} — ${name}`;
  document.getElementById('refresh-btn').style.display = '';
  await loadStockView();
}

async function loadStockView() {
  if (!currentSymbol) return;
  const days = +document.getElementById('period-select').value;
  showLoader(`Loading ${currentSymbol} data…`);

  try {
    const [stockData, summary] = await Promise.all([
      apiFetch(`/data/${currentSymbol}?days=${days}`),
      apiFetch(`/summary/${currentSymbol}`)
    ]);

    renderContent(stockData, summary);
  } catch(e) {
    alert('Error: ' + e.message);
  } finally { hideLoader(); }
}

// ── Render ───────────────────────────────────────────────────
function renderContent(stockData, summary) {
  const content = document.getElementById('content');
  content.innerHTML = `
    <div id="stats-row"></div>
    <div id="charts-row">
      <div class="chart-card">
        <h3>📉 Closing Price & 7-day MA</h3>
        <div class="chart-wrap"><canvas id="priceCanvas"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>📊 Daily Return %</h3>
        <div class="chart-wrap"><canvas id="returnCanvas"></canvas></div>
      </div>
    </div>
    <div id="compare-section">
      <h3>🔄 Compare with another stock</h3>
      <div id="compare-controls">
        <select id="cmp-select"></select>
        <select id="cmp-days">
          <option value="30">30 days</option>
          <option value="60">60 days</option>
          <option value="90">90 days</option>
        </select>
        <button onclick="runCompare()">Compare</button>
        <span id="corr-badge"></span>
      </div>
      <div id="compare-wrap"><canvas id="compareCanvas"></canvas></div>
    </div>
    <div id="gl-section" style="display:none">
      <h3>🏆 Today's Top Gainers & Losers</h3>
      <div id="gl-grid"></div>
    </div>
  `;

  // Stats
  const s = summary;
  const latestRow = stockData.data[stockData.data.length - 1] || {};
  const ret = latestRow.daily_return || 0;
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card">
      <div class="label">Latest Close</div>
      <div class="value">₹${latestRow.close?.toFixed(2) ?? '—'}</div>
      <div class="sub ${ret >= 0 ? 'up' : 'down'}">${ret >= 0 ? '▲' : '▼'} ${Math.abs(ret).toFixed(2)}% today</div>
    </div>
    <div class="stat-card">
      <div class="label">52-week High</div>
      <div class="value up">₹${s['52_week_high'] ?? '—'}</div>
      <div class="sub">Annual peak</div>
    </div>
    <div class="stat-card">
      <div class="label">52-week Low</div>
      <div class="value down">₹${s['52_week_low'] ?? '—'}</div>
      <div class="sub">Annual trough</div>
    </div>
    <div class="stat-card">
      <div class="label">Volatility Score</div>
      <div class="value" style="color:#f59e0b">${s.volatility_score ?? '—'}</div>
      <div class="sub">Annualised std dev</div>
    </div>
  `;

  // Price chart
  const labels  = stockData.data.map(d => d.date);
  const closes  = stockData.data.map(d => d.close);
  const ma7     = stockData.data.map(d => d.ma7);
  const returns = stockData.data.map(d => d.daily_return);

  priceChart?.destroy();
  priceChart = new Chart(document.getElementById('priceCanvas'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Close', data: closes, borderColor: '#4f8ef7', backgroundColor: 'rgba(79,142,247,.08)', fill: true, pointRadius: 0, tension: .3 },
        { label: '7-day MA', data: ma7, borderColor: '#f59e0b', borderDash: [4,3], pointRadius: 0, tension: .3 },
      ]
    },
    options: chartOpts('₹')
  });

  // Return chart
  returnChart?.destroy();
  returnChart = new Chart(document.getElementById('returnCanvas'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Daily Return %',
        data: returns,
        backgroundColor: returns.map(v => v >= 0 ? 'rgba(52,211,153,.7)' : 'rgba(248,113,113,.7)'),
        borderRadius: 2,
      }]
    },
    options: chartOpts('%')
  });

  // Populate compare dropdown
  const cmpSel = document.getElementById('cmp-select');
  cmpSel.innerHTML = '';
  fetch(API + '/companies').then(r => r.json()).then(d => {
    d.companies.filter(c => c.symbol !== currentSymbol).forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.symbol; opt.textContent = `${c.symbol} — ${c.name}`;
      cmpSel.appendChild(opt);
    });
  });
}

// ── Compare ──────────────────────────────────────────────────
async function runCompare() {
  const s2   = document.getElementById('cmp-select').value;
  const days = document.getElementById('cmp-days').value;
  showLoader(`Comparing ${currentSymbol} vs ${s2}…`);
  try {
    const data = await apiFetch(`/compare?symbol1=${currentSymbol}&symbol2=${s2}&days=${days}`);
    const labels = data.dates;

    document.getElementById('corr-badge').innerHTML =
      `Correlation: <span class="corr-val">${data.correlation}</span> &nbsp;|&nbsp; ` +
      `${data[currentSymbol + '_return_pct']}% vs ${data[s2 + '_return_pct']}%`;

    compareChart?.destroy();
    compareChart = new Chart(document.getElementById('compareCanvas'), {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label: currentSymbol, data: data[currentSymbol + '_normalised'], borderColor: '#4f8ef7', pointRadius: 0, tension: .3 },
          { label: s2,            data: data[s2 + '_normalised'],            borderColor: '#f59e0b', pointRadius: 0, tension: .3 },
        ]
      },
      options: chartOpts('', 'Normalised to 100')
    });
  } catch(e) { alert('Compare error: ' + e.message); }
  finally { hideLoader(); }
}

// ── Gainers/Losers ───────────────────────────────────────────
async function loadGainersLosers() {
  showLoader('Fetching market overview…');
  try {
    const data = await apiFetch('/gainers-losers');
    if (data.message) { alert(data.message); return; }

    // If no stock is selected, show empty state placeholder
    const gl = document.getElementById('gl-section') || null;
    const targetEl = gl || (() => {
      const d = document.createElement('div');
      d.id = 'gl-section';
      document.getElementById('content').appendChild(d);
      return d;
    })();

    targetEl.style.display = '';
    targetEl.innerHTML = `
      <h3>🏆 Today's Top Gainers & Losers</h3>
      <div id="gl-grid">
        <div>
          <p style="color:var(--accent2);font-size:12px;margin-bottom:8px;font-weight:600">▲ TOP GAINERS</p>
          <ul class="gl-list">
            ${data.top_3_gainers.map(g => `
              <li>
                <span class="gl-sym">${g.symbol}</span>
                <span class="gl-ret up">+${g.daily_return?.toFixed(2)}%</span>
              </li>`).join('')}
          </ul>
        </div>
        <div>
          <p style="color:var(--red);font-size:12px;margin-bottom:8px;font-weight:600">▼ TOP LOSERS</p>
          <ul class="gl-list">
            ${data.top_3_losers.map(g => `
              <li>
                <span class="gl-sym">${g.symbol}</span>
                <span class="gl-ret down">${g.daily_return?.toFixed(2)}%</span>
              </li>`).join('')}
          </ul>
        </div>
      </div>
    `;
  } catch(e) { alert('Error: ' + e.message); }
  finally { hideLoader(); }
}

// ── Refresh ───────────────────────────────────────────────────
async function refreshCurrent() {
  if (!currentSymbol) return;
  showLoader(`Refreshing ${currentSymbol}…`);
  try {
    await fetch(API + `/refresh/${currentSymbol}`, { method: 'POST' });
    await loadStockView();
  } catch(e) { alert('Refresh error: ' + e.message); hideLoader(); }
}

// ── Chart defaults ────────────────────────────────────────────
function chartOpts(unit = '', title = '') {
  return {
    responsive: true, maintainAspectRatio: false,
    plugins: {
      legend: { labels: { color: '#94a3b8', font: { size: 11 } } },
      title: title ? { display: true, text: title, color: '#64748b', font: { size: 11 } } : undefined,
      tooltip: {
        callbacks: {
          label: ctx => ` ${ctx.dataset.label}: ${unit === '₹' ? '₹' : ''}${ctx.raw?.toFixed(2)}${unit === '%' ? '%' : ''}`
        }
      }
    },
    scales: {
      x: { ticks: { color: '#64748b', maxTicksLimit: 8, font: { size: 10 } }, grid: { color: '#1e2130' } },
      y: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: '#252a3d' } }
    }
  };
}

// ── Period change ─────────────────────────────────────────────
document.getElementById('period-select').onchange = loadStockView;

// ── Init ──────────────────────────────────────────────────────
loadCompanies();
</script>
</body>
</html>
